<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ani-Math</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles_2.css">
</head>
<body>
  <div class="container">
    <div id="loginPanel" class="login">
      <h3>Login</h3>
      <input type="text" id="username" placeholder="Username"><br>
      <div class="testDiv">
        <input type="password" id="password" placeholder="Password" autocomplete="off"/>
        <label class="containerPass">
          <img id="passwordEye" class="passwordEye" src="assets/icons/eyeClosed.png"/>
          <input type="checkbox" id="showPass">
          <span class="checkmark"></span>
        </label>
      </div>
      <label class="containerChBx"> Remember Me
        <input type="checkbox" id="rememberMe" >
        <span class="checkmark"></span>
      </label>
      <button id="loginBtn">Login</button>
      <button id="registerBtn">Sign up</button>
    </div>

    <div id="registerPanel" class="register hidden active">
      <input type="text" name="" id="username_reg" placeholder="Username">
      <input type="text" name="" id="email_reg" placeholder="Email">
      <input type="password" name="" id="password_reg" placeholder="Password">
      <input type="password" name="" id="password_regConf" placeholder="Confirm Password">
      <button>Sign up</button>
    </div>

    <div id="app" class="hidden active">
      <h2 id="welcome"></h2>
      <p id="question"></p>
      <input type="number" id="answer">
      <button id="submitBtn">Submit</button>
      <img id="resultImg" src="" />
    </div>
  </div>

  <script src="scripts.js" class="resultImg"></script>
</body>
</html>
